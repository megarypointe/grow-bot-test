<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #3157d5;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 15% 90%, rgba(122, 229, 130, .16), transparent 18rem),
        var(--background);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .lab-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 62px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(23, 23, 23, .12);
      overflow: hidden;
      background: rgba(255, 255, 255, .58);
      font-weight: 750;
      letter-spacing: -.02em;
    }

    .lab-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .lab-flask {
      width: 26px;
      height: 26px;
      color: #3157d5;
    }

    .lab-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(122, 229, 130, .55);
      animation: float 3.2s ease-in-out infinite;
    }

    .lab-bubble.one { width: 9px; height: 9px; left: 8%; top: 15px; }
    .lab-bubble.two { width: 14px; height: 14px; right: 10%; top: 30px; animation-delay: -1s; }
    .lab-bubble.three { width: 6px; height: 6px; right: 17%; top: 13px; animation-delay: -2s; }

    main {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .primary-action {
      min-width: 190px;
      padding: 16px 24px;
      border: 1px solid var(--button);
      border-radius: 6px;
      background: var(--button);
      color: var(--button-text);
      cursor: pointer;
      font: 650 16px/1.2 inherit;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: translateY(-2px);
      background: var(--button-hover);
      color: var(--button-hover-text);
    }

    .primary-action:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: .62;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .primary-action { width: min(100%, 320px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <header class="lab-header">
    <span class="lab-bubble one" aria-hidden="true"></span>
    <span class="lab-bubble two" aria-hidden="true"></span>
    <span class="lab-bubble three" aria-hidden="true"></span>
    <span class="lab-title">
      <svg class="lab-flask" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M12 3h8M14 3v9L7.5 23.2A3.8 3.8 0 0 0 10.8 29h10.4a3.8 3.8 0 0 0 3.3-5.8L18 12V3M10 21h12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="24" r="1.4" fill="currentColor"/>
        <circle cx="19" cy="21.5" r="1" fill="currentColor"/>
      </svg>
      GrowBot Test Laboratory
    </span>
  </header>
  <main>
    <button class="primary-action" id="open-chat" type="button" disabled>Loading chat…</button>
    <span class="visually-hidden" id="messenger-status" aria-live="polite">Connecting to chat.</span>
  </main>

  <script>
    (() => {
      const appId = document.documentElement.dataset.intercomAppId;
      const button = document.getElementById('open-chat');
      const status = document.getElementById('messenger-status');
      let loaderReady = false;
      let failed = false;
      let openingTimer;

      window.intercomSettings = { app_id: appId };

      const markLoaderReady = () => {
        if (loaderReady || failed) return;
        loaderReady = true;
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat loaded. Open it to continue.';
      };

      const markOpened = () => {
        window.clearTimeout(openingTimer);
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat opened successfully.';
      };

      const markFailed = () => {
        if (failed) return;
        failed = true;
        window.clearTimeout(openingTimer);
        button.disabled = true;
        button.textContent = 'Chat unavailable';
        status.textContent = 'Chat could not load. Refresh the page or check content-blocking settings.';
      };

      const markOpenFailed = () => {
        button.disabled = false;
        button.textContent = 'Try again';
        status.textContent = 'Chat could not open. Try again or disable content blocking for this page.';
      };

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      window.Intercom('onShow', markOpened);

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', { app_id: appId });
        markLoaderReady();
      };
      script.onerror = markFailed;
      document.head.appendChild(script);

      window.setTimeout(() => {
        if (!loaderReady) markFailed();
      }, 12000);

      button.addEventListener('click', () => {
        if (!loaderReady || failed) return;
        button.disabled = true;
        button.textContent = 'Opening chat…';
        status.textContent = 'Opening chat.';
        window.Intercom('show');
        window.clearTimeout(openingTimer);
        openingTimer = window.setTimeout(markOpenFailed, 8000);
      });
    })();
  </script>
</body>
</html>
