<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #8fb4ff;
      --lab-grid: rgba(156, 203, 255, .075);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      position: relative;
      display: grid;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      color: #edf7ff;
      background:
        radial-gradient(circle at 50% 110%, rgba(72, 255, 169, .18), transparent 42%),
        radial-gradient(circle at 12% 20%, rgba(78, 119, 255, .25), transparent 33%),
        radial-gradient(circle at 88% 25%, rgba(160, 63, 255, .22), transparent 34%),
        linear-gradient(145deg, #07111e 0%, #0b1830 48%, #120d28 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .space-backdrop {
      position: fixed;
      inset: -2.5%;
      z-index: 0;
      pointer-events: none;
      background-image: url("assets/growbot-background.png");
      background-position: center center;
      background-size: cover;
      transform: scale(1.015);
    }

    .space-backdrop::before {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(2, 5, 28, .24) 0%, rgba(3, 5, 25, .06) 27%, rgba(2, 4, 20, .06) 70%, rgba(1, 3, 16, .28) 100%),
        radial-gradient(circle at center, rgba(2, 3, 20, .18) 0%, transparent 38%);
      content: "";
    }

    .space-backdrop::after {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 42%, rgba(1, 2, 13, .18) 100%);
      content: "";
    }

    .deep-space-flow {
      position: fixed;
      inset: -28%;
      z-index: 0;
      pointer-events: none;
      background:
        repeating-radial-gradient(ellipse at 24% 44%, rgba(86, 191, 255, .12) 0 3%, transparent 7% 14%),
        repeating-radial-gradient(ellipse at 76% 58%, rgba(156, 93, 255, .1) 0 2%, transparent 6% 17%),
        conic-gradient(from 110deg at 54% 48%, transparent, rgba(75, 215, 255, .08), transparent 28%, rgba(173, 87, 255, .06), transparent 64%);
      filter: blur(58px);
      mix-blend-mode: screen;
      opacity: .15;
      transform-origin: center;
      animation: water-flow 42s ease-in-out infinite alternate;
    }

    .distant-galaxy {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      width: 13vw;
      min-width: 120px;
      aspect-ratio: 2.4;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 250, 224, .46) 0 2%, rgba(117, 220, 255, .2) 8%, rgba(110, 89, 255, .09) 30%, transparent 68%),
        conic-gradient(from 20deg, transparent, rgba(105, 235, 255, .16), transparent 32%, rgba(198, 112, 255, .14), transparent 70%);
      filter: blur(3px);
      mix-blend-mode: screen;
      opacity: .14;
      animation: galaxy-turn 68s linear infinite;
    }

    .galaxy-one { top: 17%; left: 36%; rotate: -17deg; }
    .galaxy-two { right: 24%; bottom: 22%; scale: .62; rotate: 24deg; animation-duration: 91s; animation-direction: reverse; }

    .cosmic-dust {
      position: fixed;
      top: 18%;
      left: 24%;
      z-index: 0;
      width: 2px;
      height: 2px;
      pointer-events: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .42);
      box-shadow:
        9vw 13vh 0 rgba(130, 236, 255, .22),
        24vw -7vh 0 rgba(255, 255, 255, .2),
        42vw 8vh 0 rgba(174, 146, 255, .18),
        58vw 31vh 0 rgba(255, 255, 255, .2),
        67vw -2vh 0 rgba(126, 255, 202, .17),
        16vw 49vh 0 rgba(255, 205, 132, .14),
        37vw 57vh 0 rgba(255, 255, 255, .17),
        73vw 48vh 0 rgba(131, 224, 255, .16);
      opacity: .38;
      animation: dust-breathe 12s ease-in-out infinite alternate;
    }

    #mobile-chat-launcher {
      position: fixed;
      right: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 2147483000;
      display: none;
      width: 58px;
      height: 58px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 50%;
      color: #07111e;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(0, 0, 0, .38);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #mobile-chat-launcher[hidden] { display: none !important; }
    #mobile-chat-launcher:focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; }
    #mobile-chat-launcher svg { width: 28px; height: 28px; }

    @keyframes water-flow {
      0% { translate: -2% 1%; rotate: -3deg; scale: .98 1.04; }
      33% { translate: 2% -1.5%; rotate: 1deg; scale: 1.04 .97; }
      66% { translate: -1% 2%; rotate: 3deg; scale: .97 1.03; }
      100% { translate: 2.5% -.5%; rotate: -1deg; scale: 1.02 .98; }
    }

    @keyframes galaxy-turn {
      from { transform: rotate(0deg) scale(.96); opacity: .1; }
      50% { opacity: .17; }
      to { transform: rotate(360deg) scale(1.04); opacity: .1; }
    }

    @keyframes dust-breathe {
      from { opacity: .22; filter: blur(.3px); }
      to { opacity: .42; filter: blur(.8px); }
    }

    @media (max-width: 600px) {
      .space-backdrop { background-position: 41% center; }
      .deep-space-flow { opacity: .1; }
      .distant-galaxy { opacity: .1; }
      .cosmic-dust { display: none; }
      #mobile-chat-launcher { display: grid; place-items: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="space-backdrop" aria-hidden="true"></div>
  <div class="deep-space-flow" aria-hidden="true"></div>
  <div class="distant-galaxy galaxy-one" aria-hidden="true"></div>
  <div class="distant-galaxy galaxy-two" aria-hidden="true"></div>
  <div class="cosmic-dust" aria-hidden="true"></div>
  <button id="mobile-chat-launcher" type="button" aria-label="Open Grow Bot chat">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M4 4h16v12H8l-4 4V4Zm3 4v2h10V8H7Zm0 4v2h7v-2H7Z"/>
    </svg>
  </button>
  <script>
    (() => {
      const appId = document.documentElement.dataset.intercomAppId;
      const mobileLauncher = document.getElementById('mobile-chat-launcher');
      const mobileMedia = window.matchMedia('(max-width: 600px)');
      const isMobile = window.matchMedia('(max-width: 600px)').matches;
      const intercomSettings = { app_id: appId, hide_default_launcher: isMobile };

      window.intercomSettings = intercomSettings;

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      mobileLauncher.hidden = !isMobile;
      mobileLauncher.addEventListener('click', () => window.Intercom('show'));

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', intercomSettings);
        window.Intercom('onShow', () => { mobileLauncher.hidden = true; });
        window.Intercom('onHide', () => { mobileLauncher.hidden = !mobileMedia.matches; });
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
