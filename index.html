<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #8fb4ff;
      --lab-grid: rgba(156, 203, 255, .075);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      color: #edf7ff;
      background:
        radial-gradient(circle at 50% 110%, rgba(72, 255, 169, .18), transparent 42%),
        radial-gradient(circle at 12% 20%, rgba(78, 119, 255, .25), transparent 33%),
        radial-gradient(circle at 88% 25%, rgba(160, 63, 255, .22), transparent 34%),
        linear-gradient(145deg, #07111e 0%, #0b1830 48%, #120d28 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .space-backdrop {
      position: fixed;
      inset: -2.5%;
      z-index: 0;
      pointer-events: none;
      background-image: url("assets/growbot-dinosaurs-space.webp");
      background-position: center center;
      background-size: cover;
      filter: saturate(1.08) contrast(1.03);
      transform: translate3d(calc(var(--pointer-x, 0) * -10px), calc(var(--pointer-y, 0) * -7px), 0) scale(1.055);
      transition: transform 120ms ease-out;
      will-change: transform;
    }

    .space-backdrop::before {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(2, 5, 28, .7) 0%, rgba(3, 5, 25, .15) 27%, rgba(2, 4, 20, .13) 70%, rgba(1, 3, 16, .46) 100%),
        radial-gradient(circle at center, rgba(2, 3, 20, .38) 0%, transparent 32%);
      content: "";
    }

    .space-backdrop::after {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 37%, rgba(1, 2, 13, .3) 100%);
      content: "";
    }

    .cosmic-drift {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(44px);
      mix-blend-mode: screen;
      opacity: .18;
      will-change: transform;
      animation: aurora-drift 18s ease-in-out infinite alternate;
    }

    .cosmic-drift-one {
      top: 8%;
      left: 12%;
      width: 34vw;
      height: 22vw;
      background: radial-gradient(ellipse, rgba(73, 236, 255, .48), rgba(60, 85, 255, .12) 48%, transparent 72%);
      transform: translate3d(calc(var(--pointer-x, 0) * 8px), calc(var(--pointer-y, 0) * 6px), 0) rotate(-16deg);
    }

    .cosmic-drift-two {
      right: 4%;
      bottom: 6%;
      width: 38vw;
      height: 25vw;
      background: radial-gradient(ellipse, rgba(192, 88, 255, .3), rgba(255, 94, 166, .12) 48%, transparent 72%);
      transform: translate3d(calc(var(--pointer-x, 0) * -6px), calc(var(--pointer-y, 0) * -8px), 0) rotate(19deg);
      animation-delay: -7s;
      animation-duration: 23s;
    }

    .cosmic-drift-three {
      top: 34%;
      left: 38%;
      width: 27vw;
      height: 18vw;
      background: radial-gradient(ellipse, rgba(112, 255, 179, .24), rgba(75, 194, 255, .08) 55%, transparent 75%);
      transform: translate3d(calc(var(--pointer-x, 0) * 4px), calc(var(--pointer-y, 0) * -5px), 0) rotate(8deg);
      animation-delay: -13s;
      animation-duration: 27s;
    }

    .cosmic-dust {
      position: fixed;
      top: 18%;
      left: 24%;
      z-index: 1;
      width: 3px;
      height: 3px;
      pointer-events: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .62);
      box-shadow:
        9vw 13vh 0 rgba(130, 236, 255, .38),
        24vw -7vh 0 1px rgba(255, 255, 255, .32),
        42vw 8vh 0 rgba(174, 146, 255, .34),
        58vw 31vh 0 rgba(255, 255, 255, .34),
        67vw -2vh 0 rgba(126, 255, 202, .31),
        16vw 49vh 0 rgba(255, 205, 132, .25),
        37vw 57vh 0 1px rgba(255, 255, 255, .26),
        73vw 48vh 0 rgba(131, 224, 255, .28);
      opacity: .6;
      transform: translate3d(calc(var(--pointer-x, 0) * 5px), calc(var(--pointer-y, 0) * 4px), 0);
      animation: dust-breathe 8s ease-in-out infinite alternate;
    }

    @keyframes aurora-drift {
      0% { margin: -1.5% 0 0 -1%; scale: .96; opacity: .12; }
      50% { margin: 1% 0 0 1.5%; scale: 1.04; opacity: .22; }
      100% { margin: -1% 0 0 2%; scale: 1; opacity: .16; }
    }

    @keyframes dust-breathe {
      from { opacity: .34; filter: blur(.2px); }
      to { opacity: .66; filter: blur(.8px); }
    }

    .lab-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      min-height: 62px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(184, 218, 255, .15);
      overflow: hidden;
      background: rgba(5, 13, 29, .52);
      box-shadow: 0 1px 30px rgba(54, 127, 255, .08);
      backdrop-filter: blur(18px);
      font-weight: 750;
      letter-spacing: -.02em;
    }

    .lab-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .lab-flask {
      width: 26px;
      height: 26px;
      color: #89b8ff;
      filter: drop-shadow(0 0 9px rgba(83, 148, 255, .55));
    }

    .lab-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(122, 229, 130, .55);
      animation: float 3.2s ease-in-out infinite;
    }

    .lab-bubble.one { width: 9px; height: 9px; left: 8%; top: 15px; }
    .lab-bubble.two { width: 14px; height: 14px; right: 10%; top: 30px; animation-delay: -1s; }
    .lab-bubble.three { width: 6px; height: 6px; right: 17%; top: 13px; animation-delay: -2s; }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .primary-action {
      min-width: 190px;
      padding: 16px 24px;
      border: 1px solid rgba(189, 224, 255, .3);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(119, 255, 178, .98), rgba(116, 181, 255, .98));
      box-shadow: 0 12px 40px rgba(50, 150, 255, .27), inset 0 1px rgba(255, 255, 255, .55);
      color: #07111e;
      cursor: pointer;
      font: 650 16px/1.2 inherit;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      background: linear-gradient(135deg, #a0ffc8, #9cc8ff);
      color: #07111e;
    }

    .primary-action:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: .62;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .space-backdrop { background-position: 41% center; }
      .cosmic-drift { filter: blur(32px); opacity: .12; }
      .cosmic-dust { display: none; }
      .primary-action { width: min(100%, 320px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="space-backdrop" aria-hidden="true"></div>
  <div class="cosmic-drift cosmic-drift-one" aria-hidden="true"></div>
  <div class="cosmic-drift cosmic-drift-two" aria-hidden="true"></div>
  <div class="cosmic-drift cosmic-drift-three" aria-hidden="true"></div>
  <div class="cosmic-dust" aria-hidden="true"></div>
  <header class="lab-header">
    <span class="lab-bubble one" aria-hidden="true"></span>
    <span class="lab-bubble two" aria-hidden="true"></span>
    <span class="lab-bubble three" aria-hidden="true"></span>
    <span class="lab-title">
      <svg class="lab-flask" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M12 3h8M14 3v9L7.5 23.2A3.8 3.8 0 0 0 10.8 29h10.4a3.8 3.8 0 0 0 3.3-5.8L18 12V3M10 21h12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="24" r="1.4" fill="currentColor"/>
        <circle cx="19" cy="21.5" r="1" fill="currentColor"/>
      </svg>
      GrowBot Test Laboratory
    </span>
  </header>
  <main>
    <button class="primary-action" id="open-chat" type="button" disabled>Loading chat…</button>
    <span class="visually-hidden" id="messenger-status" aria-live="polite">Connecting to chat.</span>
  </main>

  <script>
    (() => {
      const root = document.documentElement;
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      let pointerFrame;
      let pointerX = 0;
      let pointerY = 0;

      const paintPointer = () => {
        root.style.setProperty('--pointer-x', pointerX.toFixed(3));
        root.style.setProperty('--pointer-y', pointerY.toFixed(3));
        pointerFrame = undefined;
      };

      if (!reducedMotion && window.matchMedia('(pointer: fine)').matches) {
        window.addEventListener('pointermove', (event) => {
          pointerX = (event.clientX / window.innerWidth - .5) * 2;
          pointerY = (event.clientY / window.innerHeight - .5) * 2;
          if (!pointerFrame) pointerFrame = window.requestAnimationFrame(paintPointer);
        }, { passive: true });
      }

      const appId = document.documentElement.dataset.intercomAppId;
      const button = document.getElementById('open-chat');
      const status = document.getElementById('messenger-status');
      let loaderReady = false;
      let failed = false;
      let openingTimer;

      window.intercomSettings = { app_id: appId };

      const markLoaderReady = () => {
        if (loaderReady || failed) return;
        loaderReady = true;
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat loaded. Open it to continue.';
      };

      const markOpened = () => {
        window.clearTimeout(openingTimer);
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat opened successfully.';
      };

      const markFailed = () => {
        if (failed) return;
        failed = true;
        window.clearTimeout(openingTimer);
        button.disabled = true;
        button.textContent = 'Chat unavailable';
        status.textContent = 'Chat could not load. Refresh the page or check content-blocking settings.';
      };

      const markOpenFailed = () => {
        button.disabled = false;
        button.textContent = 'Try again';
        status.textContent = 'Chat could not open. Try again or disable content blocking for this page.';
      };

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      window.Intercom('onShow', markOpened);

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', { app_id: appId });
        markLoaderReady();
      };
      script.onerror = markFailed;
      document.head.appendChild(script);

      window.setTimeout(() => {
        if (!loaderReady) markFailed();
      }, 12000);

      button.addEventListener('click', () => {
        if (!loaderReady || failed) return;
        button.disabled = true;
        button.textContent = 'Opening chat…';
        status.textContent = 'Opening chat.';
        window.Intercom('show');
        window.clearTimeout(openingTimer);
        openingTimer = window.setTimeout(markOpenFailed, 8000);
      });
    })();
  </script>
</body>
</html>
