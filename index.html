<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #8fb4ff;
      --lab-grid: rgba(156, 203, 255, .075);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      color: #edf7ff;
      background:
        radial-gradient(circle at 50% 110%, rgba(72, 255, 169, .18), transparent 42%),
        radial-gradient(circle at 12% 20%, rgba(78, 119, 255, .25), transparent 33%),
        radial-gradient(circle at 88% 25%, rgba(160, 63, 255, .22), transparent 34%),
        linear-gradient(145deg, #07111e 0%, #0b1830 48%, #120d28 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .lab-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background-image:
        linear-gradient(var(--lab-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--lab-grid) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 88%, transparent);
    }

    .lab-backdrop::after {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 20%, rgba(1, 6, 17, .48) 100%);
      content: "";
    }

    .experiment-glow {
      position: absolute;
      left: 50%;
      bottom: -22rem;
      width: min(58rem, 110vw);
      aspect-ratio: 1;
      border: 1px solid rgba(110, 255, 183, .2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81, 255, 169, .2), rgba(30, 126, 255, .07) 42%, transparent 68%);
      filter: blur(3px);
      transform: translateX(-50%);
      animation: pulse-glow 7s ease-in-out infinite;
    }

    .molecule {
      position: absolute;
      width: 170px;
      height: 170px;
      opacity: .46;
      animation: drift 13s ease-in-out infinite;
    }

    .molecule::before,
    .molecule::after {
      position: absolute;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(191, 224, 255, .55);
      border-radius: 50%;
      background: rgba(76, 137, 255, .16);
      box-shadow: 86px 58px 0 -7px rgba(105, 255, 183, .24), 34px 114px 0 -11px rgba(199, 116, 255, .3);
      content: "";
    }

    .molecule::after {
      top: 31px;
      left: 26px;
      width: 112px;
      height: 76px;
      border: 0;
      border-top: 2px solid rgba(177, 212, 255, .3);
      border-bottom: 2px solid rgba(177, 212, 255, .22);
      border-radius: 0;
      background: none;
      box-shadow: none;
      transform: rotate(31deg);
    }

    .molecule-one { top: 18%; left: 6%; }
    .molecule-two { right: 5%; bottom: 12%; transform: scale(.78) rotate(55deg); animation-delay: -6s; }

    @keyframes drift {
      0%, 100% { translate: 0 0; rotate: -4deg; }
      50% { translate: 18px -24px; rotate: 7deg; }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: .72; scale: 1; }
      50% { opacity: 1; scale: 1.06; }
    }

    .lab-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      min-height: 62px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(184, 218, 255, .15);
      overflow: hidden;
      background: rgba(5, 13, 29, .52);
      box-shadow: 0 1px 30px rgba(54, 127, 255, .08);
      backdrop-filter: blur(18px);
      font-weight: 750;
      letter-spacing: -.02em;
    }

    .lab-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .lab-flask {
      width: 26px;
      height: 26px;
      color: #89b8ff;
      filter: drop-shadow(0 0 9px rgba(83, 148, 255, .55));
    }

    .lab-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(122, 229, 130, .55);
      animation: float 3.2s ease-in-out infinite;
    }

    .lab-bubble.one { width: 9px; height: 9px; left: 8%; top: 15px; }
    .lab-bubble.two { width: 14px; height: 14px; right: 10%; top: 30px; animation-delay: -1s; }
    .lab-bubble.three { width: 6px; height: 6px; right: 17%; top: 13px; animation-delay: -2s; }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .primary-action {
      min-width: 190px;
      padding: 16px 24px;
      border: 1px solid rgba(189, 224, 255, .3);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(119, 255, 178, .98), rgba(116, 181, 255, .98));
      box-shadow: 0 12px 40px rgba(50, 150, 255, .27), inset 0 1px rgba(255, 255, 255, .55);
      color: #07111e;
      cursor: pointer;
      font: 650 16px/1.2 inherit;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      background: linear-gradient(135deg, #a0ffc8, #9cc8ff);
      color: #07111e;
    }

    .primary-action:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: .62;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .primary-action { width: min(100%, 320px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="lab-backdrop" aria-hidden="true">
    <span class="experiment-glow"></span>
    <span class="molecule molecule-one"></span>
    <span class="molecule molecule-two"></span>
  </div>
  <header class="lab-header">
    <span class="lab-bubble one" aria-hidden="true"></span>
    <span class="lab-bubble two" aria-hidden="true"></span>
    <span class="lab-bubble three" aria-hidden="true"></span>
    <span class="lab-title">
      <svg class="lab-flask" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M12 3h8M14 3v9L7.5 23.2A3.8 3.8 0 0 0 10.8 29h10.4a3.8 3.8 0 0 0 3.3-5.8L18 12V3M10 21h12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="24" r="1.4" fill="currentColor"/>
        <circle cx="19" cy="21.5" r="1" fill="currentColor"/>
      </svg>
      GrowBot Test Laboratory
    </span>
  </header>
  <main>
    <button class="primary-action" id="open-chat" type="button" disabled>Loading chat…</button>
    <span class="visually-hidden" id="messenger-status" aria-live="polite">Connecting to chat.</span>
  </main>

  <script>
    (() => {
      const appId = document.documentElement.dataset.intercomAppId;
      const button = document.getElementById('open-chat');
      const status = document.getElementById('messenger-status');
      let loaderReady = false;
      let failed = false;
      let openingTimer;

      window.intercomSettings = { app_id: appId };

      const markLoaderReady = () => {
        if (loaderReady || failed) return;
        loaderReady = true;
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat loaded. Open it to continue.';
      };

      const markOpened = () => {
        window.clearTimeout(openingTimer);
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat opened successfully.';
      };

      const markFailed = () => {
        if (failed) return;
        failed = true;
        window.clearTimeout(openingTimer);
        button.disabled = true;
        button.textContent = 'Chat unavailable';
        status.textContent = 'Chat could not load. Refresh the page or check content-blocking settings.';
      };

      const markOpenFailed = () => {
        button.disabled = false;
        button.textContent = 'Try again';
        status.textContent = 'Chat could not open. Try again or disable content blocking for this page.';
      };

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      window.Intercom('onShow', markOpened);

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', { app_id: appId });
        markLoaderReady();
      };
      script.onerror = markFailed;
      document.head.appendChild(script);

      window.setTimeout(() => {
        if (!loaderReady) markFailed();
      }, 12000);

      button.addEventListener('click', () => {
        if (!loaderReady || failed) return;
        button.disabled = true;
        button.textContent = 'Opening chat…';
        status.textContent = 'Opening chat.';
        window.Intercom('show');
        window.clearTimeout(openingTimer);
        openingTimer = window.setTimeout(markOpenFailed, 8000);
      });
    })();
  </script>
</body>
</html>
