<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #3157d5;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background: var(--background);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    main { display: contents; }

    .primary-action {
      min-width: 190px;
      padding: 16px 24px;
      border: 1px solid var(--button);
      border-radius: 6px;
      background: var(--button);
      color: var(--button-text);
      cursor: pointer;
      font: 650 16px/1.2 inherit;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: translateY(-2px);
      background: var(--button-hover);
      color: var(--button-hover-text);
    }

    .primary-action:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: .62;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .primary-action { width: min(100%, 320px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <button class="primary-action" id="open-chat" type="button" disabled>Loading chat…</button>
    <span class="visually-hidden" id="messenger-status" aria-live="polite">Connecting to chat.</span>
  </main>

  <script>
    (() => {
      const appId = document.documentElement.dataset.intercomAppId;
      const button = document.getElementById('open-chat');
      const status = document.getElementById('messenger-status');
      let loaderReady = false;
      let failed = false;
      let openingTimer;

      window.intercomSettings = { app_id: appId };

      const markLoaderReady = () => {
        if (loaderReady || failed) return;
        loaderReady = true;
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat loaded. Open it to continue.';
      };

      const markOpened = () => {
        window.clearTimeout(openingTimer);
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat opened successfully.';
      };

      const markFailed = () => {
        if (failed) return;
        failed = true;
        window.clearTimeout(openingTimer);
        button.disabled = true;
        button.textContent = 'Chat unavailable';
        status.textContent = 'Chat could not load. Refresh the page or check content-blocking settings.';
      };

      const markOpenFailed = () => {
        button.disabled = false;
        button.textContent = 'Try again';
        status.textContent = 'Chat could not open. Try again or disable content blocking for this page.';
      };

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      window.Intercom('onShow', markOpened);

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', { app_id: appId });
        markLoaderReady();
      };
      script.onerror = markFailed;
      document.head.appendChild(script);

      window.setTimeout(() => {
        if (!loaderReady) markFailed();
      }, 12000);

      button.addEventListener('click', () => {
        if (!loaderReady || failed) return;
        button.disabled = true;
        button.textContent = 'Opening chat…';
        status.textContent = 'Opening chat.';
        window.Intercom('show');
        window.clearTimeout(openingTimer);
        openingTimer = window.setTimeout(markOpenFailed, 8000);
      });
    })();
  </script>
</body>
</html>
