<!doctype html>
<html lang="en" data-intercom-app-id="kxriovvt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Grow Bot Chat</title>
  <link rel="preconnect" href="https://widget.intercom.io">
  <link rel="preconnect" href="https://js.intercomcdn.com">
  <style>
    :root {
      color-scheme: light;
      --background: #faf9f6;
      --button: #171717;
      --button-text: #ffffff;
      --button-hover: #d7f870;
      --button-hover-text: #24320d;
      --focus: #8fb4ff;
      --lab-grid: rgba(156, 203, 255, .075);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      position: relative;
      display: grid;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      color: #edf7ff;
      background:
        radial-gradient(circle at 50% 110%, rgba(72, 255, 169, .18), transparent 42%),
        radial-gradient(circle at 12% 20%, rgba(78, 119, 255, .25), transparent 33%),
        radial-gradient(circle at 88% 25%, rgba(160, 63, 255, .22), transparent 34%),
        linear-gradient(145deg, #07111e 0%, #0b1830 48%, #120d28 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .space-backdrop {
      position: fixed;
      inset: -2.5%;
      z-index: 0;
      pointer-events: none;
      background-image: url("assets/growbot-robot-dinosaurs-space.webp");
      background-position: center center;
      background-size: cover;
      filter: saturate(1.08) contrast(1.03);
      transform: scale(1.035);
    }

    .space-backdrop::before {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(2, 5, 28, .7) 0%, rgba(3, 5, 25, .15) 27%, rgba(2, 4, 20, .13) 70%, rgba(1, 3, 16, .46) 100%),
        radial-gradient(circle at center, rgba(2, 3, 20, .38) 0%, transparent 32%);
      content: "";
    }

    .space-backdrop::after {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 37%, rgba(1, 2, 13, .3) 100%);
      content: "";
    }

    .deep-space-flow {
      position: fixed;
      inset: -28%;
      z-index: 0;
      pointer-events: none;
      background:
        repeating-radial-gradient(ellipse at 24% 44%, rgba(86, 191, 255, .12) 0 3%, transparent 7% 14%),
        repeating-radial-gradient(ellipse at 76% 58%, rgba(156, 93, 255, .1) 0 2%, transparent 6% 17%),
        conic-gradient(from 110deg at 54% 48%, transparent, rgba(75, 215, 255, .08), transparent 28%, rgba(173, 87, 255, .06), transparent 64%);
      filter: blur(58px);
      mix-blend-mode: screen;
      opacity: .15;
      transform-origin: center;
      animation: water-flow 42s ease-in-out infinite alternate;
    }

    .distant-galaxy {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      width: 13vw;
      min-width: 120px;
      aspect-ratio: 2.4;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 250, 224, .46) 0 2%, rgba(117, 220, 255, .2) 8%, rgba(110, 89, 255, .09) 30%, transparent 68%),
        conic-gradient(from 20deg, transparent, rgba(105, 235, 255, .16), transparent 32%, rgba(198, 112, 255, .14), transparent 70%);
      filter: blur(3px);
      mix-blend-mode: screen;
      opacity: .14;
      animation: galaxy-turn 68s linear infinite;
    }

    .galaxy-one { top: 17%; left: 36%; rotate: -17deg; }
    .galaxy-two { right: 24%; bottom: 22%; scale: .62; rotate: 24deg; animation-duration: 91s; animation-direction: reverse; }

    .cosmic-dust {
      position: fixed;
      top: 18%;
      left: 24%;
      z-index: 0;
      width: 2px;
      height: 2px;
      pointer-events: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .42);
      box-shadow:
        9vw 13vh 0 rgba(130, 236, 255, .22),
        24vw -7vh 0 rgba(255, 255, 255, .2),
        42vw 8vh 0 rgba(174, 146, 255, .18),
        58vw 31vh 0 rgba(255, 255, 255, .2),
        67vw -2vh 0 rgba(126, 255, 202, .17),
        16vw 49vh 0 rgba(255, 205, 132, .14),
        37vw 57vh 0 rgba(255, 255, 255, .17),
        73vw 48vh 0 rgba(131, 224, 255, .16);
      opacity: .38;
      animation: dust-breathe 12s ease-in-out infinite alternate;
    }

    @keyframes water-flow {
      0% { translate: -2% 1%; rotate: -3deg; scale: .98 1.04; }
      33% { translate: 2% -1.5%; rotate: 1deg; scale: 1.04 .97; }
      66% { translate: -1% 2%; rotate: 3deg; scale: .97 1.03; }
      100% { translate: 2.5% -.5%; rotate: -1deg; scale: 1.02 .98; }
    }

    @keyframes galaxy-turn {
      from { transform: rotate(0deg) scale(.96); opacity: .1; }
      50% { opacity: .17; }
      to { transform: rotate(360deg) scale(1.04); opacity: .1; }
    }

    @keyframes dust-breathe {
      from { opacity: .22; filter: blur(.3px); }
      to { opacity: .42; filter: blur(.8px); }
    }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .launch-panel {
      display: grid;
      justify-items: center;
      gap: 24px;
      width: min(680px, 100%);
      padding: 34px 28px 38px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(30px, 5vw, 58px);
      font-weight: 760;
      line-height: .98;
      letter-spacing: -.055em;
      text-wrap: balance;
      text-shadow: 0 3px 24px rgba(0, 0, 0, .86), 0 0 42px rgba(76, 202, 255, .32);
    }

    .primary-action {
      min-width: 190px;
      padding: 16px 24px;
      border: 1px solid rgba(189, 224, 255, .3);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(119, 255, 178, .98), rgba(116, 181, 255, .98));
      box-shadow: 0 12px 40px rgba(50, 150, 255, .27), inset 0 1px rgba(255, 255, 255, .55);
      color: #07111e;
      cursor: pointer;
      font: 650 16px/1.2 inherit;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary-action:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      background: linear-gradient(135deg, #a0ffc8, #9cc8ff);
      color: #07111e;
    }

    .primary-action:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: .62;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .space-backdrop { background-position: 41% center; }
      .deep-space-flow { opacity: .1; }
      .distant-galaxy { opacity: .1; }
      .cosmic-dust { display: none; }
      .primary-action { width: min(100%, 320px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="space-backdrop" aria-hidden="true"></div>
  <div class="deep-space-flow" aria-hidden="true"></div>
  <div class="distant-galaxy galaxy-one" aria-hidden="true"></div>
  <div class="distant-galaxy galaxy-two" aria-hidden="true"></div>
  <div class="cosmic-dust" aria-hidden="true"></div>
  <main>
    <section class="launch-panel" aria-labelledby="page-title">
      <h1 id="page-title">GrowBot Test Laboratory</h1>
      <button class="primary-action" id="open-chat" type="button" disabled>Loading chat…</button>
      <span class="visually-hidden" id="messenger-status" aria-live="polite">Connecting to chat.</span>
    </section>
  </main>

  <script>
    (() => {
      const appId = document.documentElement.dataset.intercomAppId;
      const button = document.getElementById('open-chat');
      const status = document.getElementById('messenger-status');
      let loaderReady = false;
      let failed = false;
      let openingTimer;

      window.intercomSettings = { app_id: appId };

      const markLoaderReady = () => {
        if (loaderReady || failed) return;
        loaderReady = true;
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat loaded. Open it to continue.';
      };

      const markOpened = () => {
        window.clearTimeout(openingTimer);
        button.disabled = false;
        button.textContent = 'Open chat';
        status.textContent = 'Chat opened successfully.';
      };

      const markFailed = () => {
        if (failed) return;
        failed = true;
        window.clearTimeout(openingTimer);
        button.disabled = true;
        button.textContent = 'Chat unavailable';
        status.textContent = 'Chat could not load. Refresh the page or check content-blocking settings.';
      };

      const markOpenFailed = () => {
        button.disabled = false;
        button.textContent = 'Try again';
        status.textContent = 'Chat could not open. Try again or disable content blocking for this page.';
      };

      window.Intercom = window.Intercom || function () {
        (window.Intercom.q = window.Intercom.q || []).push(arguments);
      };

      window.Intercom('onShow', markOpened);

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://widget.intercom.io/widget/${encodeURIComponent(appId)}`;
      script.onload = () => {
        window.Intercom('boot', { app_id: appId });
        markLoaderReady();
      };
      script.onerror = markFailed;
      document.head.appendChild(script);

      window.setTimeout(() => {
        if (!loaderReady) markFailed();
      }, 12000);

      button.addEventListener('click', () => {
        if (!loaderReady || failed) return;
        button.disabled = true;
        button.textContent = 'Opening chat…';
        status.textContent = 'Opening chat.';
        window.Intercom('show');
        window.clearTimeout(openingTimer);
        openingTimer = window.setTimeout(markOpenFailed, 8000);
      });
    })();
  </script>
</body>
</html>
